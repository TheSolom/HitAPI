name: Publish Packages

on:
    push:
        tags:
            - 'shared-v*'
            - 'types-v*'

permissions:
    contents: read
    id-token: write

jobs:
    resolve:
        name: Resolve Tag
        runs-on: ubuntu-latest
        outputs:
            package: ${{ steps.tag.outputs.package }}
            version: ${{ steps.tag.outputs.version }}
        steps:
            - name: Parse tag
              id: tag
              run: |
                  TAG="${GITHUB_REF_NAME}"
                  if [[ "$TAG" == shared-v* ]]; then
                    echo "package=shared" >> "$GITHUB_OUTPUT"
                    echo "version=${TAG#shared-v}" >> "$GITHUB_OUTPUT"
                  elif [[ "$TAG" == types-v* ]]; then
                    echo "package=types" >> "$GITHUB_OUTPUT"
                    echo "version=${TAG#types-v}" >> "$GITHUB_OUTPUT"
                  else
                    echo "Unknown tag format: $TAG" >&2
                    exit 1
                  fi

    publish-shared:
        name: Publish @hitapi/shared
        runs-on: ubuntu-latest
        needs: resolve
        if: needs.resolve.outputs.package == 'shared'
        environment: npm-publish
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm
                  registry-url: https://registry.npmjs.org

            - name: Install dependencies
              run: npm ci

            - name: Bump version
              working-directory: packages/shared
              run: npm version ${{ needs.resolve.outputs.version }} --no-git-tag-version

            - name: Build @hitapi/shared
              run: npm run build:shared

            - name: Publish
              working-directory: packages/shared
              run: npm publish --access public --provenance

    publish-types:
        name: Publish @hitapi/types
        runs-on: ubuntu-latest
        needs: resolve
        if: needs.resolve.outputs.package == 'types'
        environment: npm-publish
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm
                  registry-url: https://registry.npmjs.org

            - name: Install dependencies
              run: npm ci

            - name: Bump version
              working-directory: packages/types
              run: npm version ${{ needs.resolve.outputs.version }} --no-git-tag-version

            # shared must already be published on npm since types depends on it
            # publish shared-v* tag first before types-v* tag
            - name: Build @hitapi/shared
              run: npm run build:shared

            - name: Build @hitapi/types
              run: npm run build:types

            - name: Publish
              working-directory: packages/types
              run: npm publish --access public --provenance
