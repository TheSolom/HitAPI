name: CI

on:
    push:
        branches:
            - master
            - dev
    pull_request:
        branches:
            - master
            - dev

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run ESLint
              run: npm run lint

    build-packages:
        name: Build Packages
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            # Build order matters: types depends on shared
            - name: Build @hitapi/shared
              run: npm run build:shared

            - name: Build @hitapi/types
              run: npm run build:types

            - name: Upload shared dist artifact
              uses: actions/upload-artifact@v4
              with:
                  name: shared-dist
                  path: packages/shared/dist
                  retention-days: 1

            - name: Upload types dist artifact
              uses: actions/upload-artifact@v4
              with:
                  name: types-dist
                  path: packages/types/dist
                  retention-days: 1

    test:
        name: Test
        runs-on: ubuntu-latest
        needs: build-packages
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Download shared dist
              uses: actions/download-artifact@v4
              with:
                  name: shared-dist
                  path: packages/shared/dist

            - name: Download types dist
              uses: actions/download-artifact@v4
              with:
                  name: types-dist
                  path: packages/types/dist

            - name: Run tests
              run: npm test
