name: HitAPI
services:
    api:
        build:
            context: .
            dockerfile: apps/api/Dockerfile
        container_name: api
        restart: unless-stopped
        env_file:
            - ./apps/api/.env.production.local
        ports:
            - '${PORT:-3000}:${PORT:-3000}'
        volumes:
            - ./logs:/app/apps/api/logs
volumes:
    db-data:
